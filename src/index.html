<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPS PARK DEMO SITE - WDD231</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div id="content">
        <header>
            <h1>US NATIONAL PARKS</h1>
            <nav>&equiv; MENU</nav>
        </header>
        <main>
            <section id="hero"></section>
              <img src="public/images/us-map.png" alt="Map of the US">
            <section id="parkInfo"></section>
              <h2 id="parkName">Park Name</h2>
              <div>
                <p id="parkType">Park Type</p>
                <p id="parkStates">Park States</p>
              </div>
            <section id="parkMenu">
              <ul>
                <li><p>INFO></p><p><svg><use href="public/images/sprite.svg#info"></use></svg></p></li>
                <li><p>ALERTS</p><p><svg><use href="public/images/sprite.svg#alerts"></use></svg></p></li>
                <li><p>MAPS</p><p><svg><use href="public/images/sprite.svg#maps"></use></svg></p></li>
                <li><p>EVENTS</p><p><svg><use href="public/images/sprite.svg#events"></use></svg></p></li>
                <li><p>FEES</p><p><svg><use href="public/images/sprite.svg#fees"></use></svg></p></li>
              </ul>
            </section>
        </main>
    </div>
  </body>
