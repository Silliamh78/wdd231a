<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions and Animations</title>
    <style>
        #demo1{
            width: 800px;
            border: 3px solid black;
        }

        #box1{
            height: 200px;
            width: 200px;
            background-color: red;
        }

        #box1.hover{
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>Demo 1</h1>
    <div id="demo1">
        <div id="box1"></div>
    </div>
</body>
</html>
